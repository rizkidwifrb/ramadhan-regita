<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ramadhan Untuk Regita</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<audio id="music" loop>
<source src="assets/music.mp3">
</audio>

<!-- SPACE -->
<canvas id="space"></canvas>
<div class="moon"></div>

<!-- SCENE 1 -->
<section class="scene active">

<h1 class="title">Selamat Datang Ramadhan</h1>
<h2>Untuk Regita Septiana Andini</h2>

<button class="openBtn" onclick="openLetter()">
OPEN
</button>

</section>

<!-- SCENE 2 -->
<section class="scene">

<div class="letter">
<p id="typing"></p>
</div>

<div class="nav">
<button onclick="prev()">Kembali</button>
<button onclick="next()">Lanjut</button>
</div>

</section>

<!-- SCENE 3 -->
<section class="scene">

<img id="slider">

<video autoplay muted loop>
<source src="assets/video.mp4">
</video>

<div class="nav">
<button onclick="prev()">Kembali</button>
<button onclick="next()">Lanjut</button>
</div>

</section>

<!-- SCENE 4 -->
<section class="scene ending">
<h1>Selamat Berpuasa</h1>
<p>maaf ya telat, aku buat ini hampir 2 mingguan hehe 🤍</p>
</section>

<script src="script.js"></script>
</body>
</html>
