<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Ramadhan Untuk Regita</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

<style>

/* =========================
GLOBAL RESET
=========================*/
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
text-align:center;
}

body{
background:black;
color:white;
overflow-x:hidden;
scroll-behavior:smooth;
}

/* =========================
SECTION SYSTEM
=========================*/
section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:40px;
opacity:0;
transform:translateY(80px);
transition:1.2s;
}

section.show{
opacity:1;
transform:translateY(0);
}

/* =========================
BACKGROUND STAR
=========================*/
canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* =========================
HERO
=========================*/
.hero h1{
font-size:42px;
animation:fade 2s ease forwards;
}

.hero h2{
margin-top:20px;
font-weight:300;
animation:fade 3s ease forwards;
}

@keyframes fade{
from{opacity:0;transform:translateY(40px);}
to{opacity:1;}
}

/* =========================
SCROLL TEXT
=========================*/
.scroll{
position:absolute;
bottom:30px;
animation:updown 2s infinite;
}

@keyframes updown{
0%,100%{transform:translateY(0);}
50%{transform:translateY(10px);}
}

/* =========================
MESSAGE
=========================*/
.message p{
max-width:700px;
line-height:1.8;
font-size:20px;
}

/* =========================
GALLERY
=========================*/
.gallery{
overflow:hidden;
width:100%;
}

#photoContainer{
display:flex;
gap:30px;
}

.photo{
height:260px;
border-radius:20px;
box-shadow:0 0 25px gold;
transition:.5s;
}

.photo:hover{
transform:scale(1.1);
}

/* =========================
VIDEO
=========================*/
video{
width:90%;
border-radius:20px;
box-shadow:0 0 40px white;
}

/* =========================
FINAL
=========================*/
.final h1{
font-size:50px;
font-weight:800;
}

.final p{
margin-top:20px;
opacity:.8;
}

/* =========================
MOBILE
=========================*/
@media(max-width:768px){

.hero h1{font-size:28px;}
.photo{height:180px;}

}

</style>
</head>

<body>

<canvas id="stars"></canvas>

<audio id="music" loop>
<source src="assets/music.mp3">
</audio>

<!-- HERO -->
<section class="hero">
<h1>Selamat Datang Ramadhan</h1>
<h2>Untuk Regita Septiana Andini</h2>
<div class="scroll">↓ Scroll Kebawah ↓</div>
</section>

<!-- MESSAGE -->
<section class="message">
<p>
Terima kasih sudah hadir dalam hidupku.
Semoga Ramadhan ini membawa kebahagiaan,
ketenangan, dan senyuman untukmu.
</p>
</section>

<!-- FOTO -->
<section class="gallery">
<div id="photoContainer"></div>
</section>

<!-- VIDEO -->
<section>
<video autoplay muted loop>
<source src="assets/video.mp4">
</video>
</section>

<!-- FINAL -->
<section class="final">
<h1>SELAMAT BERPUASA</h1>
<p>(maaf ya telat, aku buat ini 2 mingguan soalnya hehe)</p>
</section>

<script>

/* =========================
STAR BACKGROUND
=========================*/
const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

let stars=[];

for(let i=0;i<120;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2
});
}

function animateStars(){
ctx.clearRect(0,0,canvas.width,canvas.height);

stars.forEach(s=>{
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fillStyle="white";
ctx.fill();
s.y+=0.2;
if(s.y>canvas.height)s.y=0;
});

requestAnimationFrame(animateStars);
}
animateStars();

/* =========================
LOAD 49 FOTO AUTO
=========================*/
const container=document.getElementById("photoContainer");

for(let i=1;i<=49;i++){
let img=document.createElement("img");
img.src=`assets/image (${i}).jpg`;
img.className="photo";
container.appendChild(img);
}

/* =========================
AUTO SLIDE FOTO
=========================*/
let pos=0;

function slide(){
pos-=0.3;
container.style.transform=`translateX(${pos}px)`;

if(Math.abs(pos)>container.scrollWidth/2){
pos=0;
}

requestAnimationFrame(slide);
}
slide();

/* =========================
SCROLL ANIMATION
=========================*/
const observer=new IntersectionObserver(entries=>{
entries.forEach(e=>{
if(e.isIntersecting){
e.target.classList.add("show");
}
});
});

document.querySelectorAll("section")
.forEach(sec=>observer.observe(sec));

/* =========================
MUSIC START AFTER TOUCH
=========================*/
const music=document.getElementById("music");

document.body.addEventListener("click",()=>{
music.play().catch(()=>{});
},{once:true});

</script>

</body>
</html>
